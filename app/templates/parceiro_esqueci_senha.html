<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Esqueci minha senha — Portal do Parceiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
        <div class="card shadow-sm border-0 w-100" style="max-width: 420px;">
            <div class="card-body p-4">
                <h1 class="h5 text-center mb-1">Esqueci minha senha</h1>
                <p class="text-muted text-center small mb-4">
                    Informe o e-mail do seu cadastro de parceiro para receber o link de redefinição.
                </p>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="post" action="{{ url_for('parceiro_esqueci_senha') }}">
                    <div class="mb-4">
                        <label for="email" class="form-label">E-mail</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enviar link de redefinição</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{{ url_for('parceiro_login') }}" class="small">Voltar ao login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
