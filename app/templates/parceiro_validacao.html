{% extends "parceiro_base.html" %}

{% block title %}Validar Cupom — Portal do Parceiro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-6">
        <div class="text-center mb-4">
            <h1 class="h3 mb-1">Validação de Código</h1>
            <p class="text-muted mb-0">Digite o código apresentado pelo morador no balcão</p>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-md-5">
                <form method="post" action="{{ url_for('parceiro_validar_codigo') }}">
                    <div class="mb-4">
                        <label for="codigo_unico" class="form-label fw-semibold">Código do cupom</label>
                        <input
                            type="text"
                            class="form-control form-control-lg text-center text-uppercase"
                            id="codigo_unico"
                            name="codigo_unico"
                            value="{{ codigo_url }}"
                            placeholder="Ex: PRP-ABC123"
                            autocomplete="off"
                            autofocus
                            required
                            style="font-size: 1.5rem; letter-spacing: 0.05em;"
                        >
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg py-3">
                            <i class="bi bi-check-circle me-2"></i>Validar Código
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <p class="text-center text-muted small mt-3 mb-0">
            Após a validação, o cupom será marcado como utilizado e não poderá ser reutilizado.
        </p>
    </div>
</div>
{% endblock %}
