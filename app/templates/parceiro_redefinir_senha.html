<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redefinir senha — Portal do Parceiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center py-4">
        <div class="card shadow-sm border-0 w-100" style="max-width: 420px;">
            <div class="card-body p-4">
                <h1 class="h5 text-center mb-1">Redefinir senha</h1>
                <p class="text-muted text-center small mb-4">Crie uma nova senha para o Portal do Parceiro.</p>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="post" action="{{ url_for('parceiro_redefinir_senha', token=token) }}">
                    <div class="mb-3">
                        <label for="senha" class="form-label">Nova senha</label>
                        <input type="password" class="form-control" id="senha" name="senha"
                               minlength="6" required autocomplete="new-password">
                    </div>
                    <div class="mb-4">
                        <label for="confirmacao_senha" class="form-label">Confirmar nova senha</label>
                        <input type="password" class="form-control" id="confirmacao_senha" name="confirmacao_senha"
                               minlength="6" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Salvar nova senha</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
